<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ベンチプレスとダンベルベンチプレスを比較</title>
  <desc id="desc">ベンチプレスとダンベルベンチプレスを、平均重量、安定性、片側差への向き合いやすさで比較するページです。</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff9f0" />
      <stop offset="100%" stop-color="#f0efe8" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="28" />
  <rect x="56" y="56" width="180" height="42" rx="21" fill="#10261f" />
  <text x="84" y="83" fill="#ffffff" font-size="22" font-weight="700" font-family="'Noto Sans JP', sans-serif">Comparison</text>
  <text x="56" y="172" fill="#10261f" font-size="60" font-weight="800" font-family="'Noto Sans JP', sans-serif">ベンチプレスとダンベルベンチプレスを比較</text>
  <text x="56" y="242" fill="#4e5b55" font-size="26" font-family="'Noto Sans JP', sans-serif">ベンチプレス / ダンベルベンチプレス / インクラインベンチプレス</text>
  <rect x="56" y="302" width="1088" height="264" rx="32" fill="#ffffff" opacity="0.92" />
  <text x="96" y="372" fill="#5a6c64" font-size="22" font-weight="700" font-family="'Noto Sans JP', sans-serif">ベンチプレス男性中級: 98 kg / (217 lbs)</text>
  <text x="428" y="372" fill="#5a6c64" font-size="22" font-weight="700" font-family="'Noto Sans JP', sans-serif">ダンベルベンチ男性中級: 41kg / (90 lbs)</text>
  <text x="760" y="372" fill="#5a6c64" font-size="22" font-weight="700" font-family="'Noto Sans JP', sans-serif">女性中級の比較: 51 kg / (111 lbs)</text>
  <text x="96" y="506" fill="#10261f" font-size="30" font-weight="700" font-family="'Noto Sans JP', sans-serif">扱える重量の違いを見る / 片側差の出やすさを比較する</text>
</svg>
