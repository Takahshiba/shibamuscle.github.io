<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">デッドリフトとルーマニアンデッドリフトを比較</title>
  <desc id="desc">デッドリフトとルーマニアンデッドリフトを、平均重量、可動域、ハムストリング主導かどうかで比較するページです。</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff9f0" />
      <stop offset="100%" stop-color="#f0efe8" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="28" />
  <rect x="56" y="56" width="180" height="42" rx="21" fill="#10261f" />
  <text x="84" y="83" fill="#ffffff" font-size="22" font-weight="700" font-family="'Noto Sans JP', sans-serif">Comparison</text>
  <text x="56" y="172" fill="#10261f" font-size="60" font-weight="800" font-family="'Noto Sans JP', sans-serif">デッドリフトとルーマニアンデッドリフトを比較</text>
  <text x="56" y="242" fill="#4e5b55" font-size="26" font-family="'Noto Sans JP', sans-serif">デッドリフト / ルーマニアンデッドリフト / ラックプル</text>
  <rect x="56" y="302" width="1088" height="264" rx="32" fill="#ffffff" opacity="0.92" />
  <text x="96" y="372" fill="#5a6c64" font-size="22" font-weight="700" font-family="'Noto Sans JP', sans-serif">デッドリフト男性中級: 152 kg / (336 lbs)</text>
  <text x="428" y="372" fill="#5a6c64" font-size="22" font-weight="700" font-family="'Noto Sans JP', sans-serif">RDL男性中級: 120 kg / (266 lbs)</text>
  <text x="760" y="372" fill="#5a6c64" font-size="22" font-weight="700" font-family="'Noto Sans JP', sans-serif">女性中級の比較: 87 kg / (193 lbs)</text>
  <text x="96" y="506" fill="#10261f" font-size="30" font-weight="700" font-family="'Noto Sans JP', sans-serif">床引きとRDLの違いを見る / ハムストリング主導か全身連動かで整理する</text>
</svg>
